<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M-Groove · Finance</title>
    <meta
      name="description"
      content="Dance group finances — expenses, splits & settle-up"
    />
    <meta name="theme-color" content="#f0c040" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="M-Groove" />
    <link rel="icon" type="image/png" href="/mgroove/icon.png" />
    <link rel="apple-touch-icon" href="/mgroove/icon.png" />
    <link rel="manifest" href="/mgroove/manifest.json" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/mgroove/shared.css" />
    <link rel="stylesheet" href="/mgroove/finance.css" />
    <script>
      window.__firebase_config = JSON.stringify({
        apiKey: "AIzaSyDGrq3qdR3pqHc0dQMXnE20c2wcLOINN-8",
        authDomain: "rendercode-d73da.firebaseapp.com",
        projectId: "rendercode-d73da",
        storageBucket: "rendercode-d73da.firebasestorage.app",
        messagingSenderId: "798989930424",
        appId: "1:798989930424:web:7f324e5153cabc5d90494d",
      });
    </script>
  </head>

  <body>
    <div class="shell">
      <header>
        <span class="logo"><img src="/mgroove/icon.png" alt="M-Groove"> M-Groove</span>
        <div class="hdr-r">
          <a class="nav-link" href="/mgroove/">🏠 Main</a>
          <label class="adm-l"
            ><input type="checkbox" id="admTog" /> 👑 Admin</label
          >
        </div>
      </header>
      <div class="fin">
        <h2 class="sec-title">📊 Finances</h2>
        <div class="add-box">
          <div class="add-box-label">➕ Add Expense</div>
          <div class="irow">
            <input id="exDesc" placeholder="What for…" />
            <input
              type="number"
              id="exAmt"
              placeholder="€"
              min="0"
              step="0.01"
              class="w-fix-sm"
            />
          </div>
          <div class="irow">
            <input id="exPayer" placeholder="Paid by…" list="userDl" />
            <button class="btn btn-add" id="addExp">Add</button>
          </div>
          <div class="add-box-label">Split among:</div>
          <div class="chips" id="exChips"></div>
        </div>
        <div id="finCh"></div>
        <div id="settleS" class="hidden">
          <h3 class="sec-sub">💸 Settle Up</h3>
          <div id="settleL"></div>
        </div>
        <div id="finE" class="empty">
          <div class="icon">💸</div>
          No expenses yet
        </div>
        <h3 id="expHdr" class="sec-sub hidden">All Expenses</h3>
        <div id="expL"></div>
      </div>
      <datalist id="userDl"></datalist>
    </div>

    <script type="module">
      import {
        $,
        mk,
        esc,
        S,
        save,
        me,
        cDlg,
        initAdmin,
        initFirebase,
        updDl,
      } from "/mgroove/shared.js";

      let expSplit = new Set();

      function renderChips() {
        const c = $("exChips");
        c.innerHTML = "";
        Object.keys(S.users).forEach((u) => {
          const ch = mk("div", "chip" + (expSplit.has(u) ? " on" : ""));
          ch.textContent = u;
          ch.onclick = () => {
            expSplit.has(u) ? expSplit.delete(u) : expSplit.add(u);
            ch.classList.toggle("on", expSplit.has(u));
          };
          c.appendChild(ch);
        });
      }

      function doAddExp() {
        const desc = $("exDesc").value.trim(),
          amt = parseFloat($("exAmt").value),
          payer = $("exPayer").value.trim() || me();
        if (!desc || !amt || amt <= 0) return;
        if (S.users[payer] && !expSplit.has(payer)) expSplit.add(payer);
        S.expenses.push({
          sourceId: "m-" + Date.now(),
          title: desc,
          cost: amt,
          payer,
          attendees: [...expSplit],
        });
        save();
        $("exDesc").value = "";
        $("exAmt").value = "";
        $("exPayer").value = "";
        expSplit.clear();
        renderFin();
        renderChips();
      }
      $("addExp").onclick = doAddExp;
      $("exDesc").onkeydown = (e) => {
        if (e.key === "Enter") doAddExp();
      };
      $("exPayer").addEventListener("change", () => {
        const p = $("exPayer").value.trim();
        if (p && S.users[p] && !expSplit.has(p)) {
          expSplit.add(p);
          renderChips();
        }
      });

      function renderFin() {
        const ch = $("finCh"),
          li = $("expL"),
          sl = $("settleL");
        ch.innerHTML = "";
        li.innerHTML = "";
        sl.innerHTML = "";
        if (!S.expenses.length) {
          $("finE").classList.remove("hidden");
          $("expHdr").classList.add("hidden");
          $("settleS").classList.add("hidden");
          return;
        }
        $("finE").classList.add("hidden");
        $("expHdr").classList.remove("hidden");

        const stats = {};
        S.expenses.forEach((e, idx) => {
          const d = mk("div", "exp-card");
          const txt = mk("span");
          txt.textContent =
            e.title +
            " — €" +
            e.cost.toFixed(2) +
            " by " +
            e.payer +
            " · Split: " +
            (e.attendees.length ? e.attendees.join(", ") : "nobody");
          d.appendChild(txt);
          if (S.isAdmin) {
            const db = mk("button", "btn btn-icon del");
            db.textContent = "✕";
            db.onclick = async () => {
              if (!(await cDlg("Delete this expense?"))) return;
              S.expenses.splice(idx, 1);
              save();
              renderFin();
            };
            d.appendChild(db);
          }
          li.appendChild(d);
          if (!stats[e.payer]) stats[e.payer] = { paid: 0, owes: 0 };
          stats[e.payer].paid += e.cost;
          if (e.attendees.length) {
            const sh = e.cost / e.attendees.length;
            e.attendees.forEach((a) => {
              if (!stats[a]) stats[a] = { paid: 0, owes: 0 };
              stats[a].owes += sh;
            });
          }
        });

        const entries = Object.entries(stats)
          .map(([n, d]) => ({ name: n, net: d.paid - d.owes }))
          .toSorted((a, b) => b.net - a.net);
        const mx = Math.max(...entries.map((e) => Math.abs(e.net)), 1);
        entries.forEach(({ name, net }) => {
          const pct = (Math.abs(net) / mx) * 100,
            pos = net >= 0,
            u = S.users[name];
          let pp = "";
          if (u?.paypal) {
            const h = u.paypal.startsWith("http")
              ? u.paypal
              : "https://paypal.me/" + u.paypal.replace("@", "");
            pp =
              ' <a class="pp-link" href="' +
              h +
              '" target="_blank">PayPal ↗</a>';
          }
          const loc = u?.location
            ? ' <span class="dim">(' + esc(u.location) + ")</span>"
            : "";
          const item = mk("div", "bar-i");
          item.innerHTML =
            '<div class="bar-h"><span>' +
            esc(name) +
            loc +
            '</span><span class="' +
            (pos ? "c-teal" : "c-pink") +
            '">' +
            (pos ? "Gets" : "Owes") +
            " €" +
            Math.abs(net).toFixed(2) +
            pp +
            '</span></div><div class="bar-t"><div class="bar-f ' +
            (pos ? "pos" : "neg") +
            '" style="width:' +
            pct +
            '%"></div></div>';
          ch.appendChild(item);
        });

        const tx = settle(entries);
        if (tx.length) {
          $("settleS").classList.remove("hidden");
          tx.forEach((t) => {
            const c = mk("div", "settle-card");
            c.innerHTML =
              "<strong>" +
              esc(t.from) +
              '</strong><span class="ar">→</span><strong>' +
              esc(t.to) +
              "</strong>: €" +
              t.amount.toFixed(2);
            sl.appendChild(c);
          });
        } else $("settleS").classList.add("hidden");
      }

      function settle(entries) {
        const db = [],
          cr = [];
        entries.forEach((e) => {
          if (e.net < -0.01) db.push({ n: e.name, a: -e.net });
          else if (e.net > 0.01) cr.push({ n: e.name, a: e.net });
        });
        db.sort((a, b) => b.a - a.a);
        cr.sort((a, b) => b.a - a.a);
        const tx = [];
        let i = 0,
          j = 0;
        while (i < db.length && j < cr.length) {
          const a = Math.min(db[i].a, cr[j].a);
          if (a > 0.01) tx.push({ from: db[i].n, to: cr[j].n, amount: a });
          db[i].a -= a;
          cr[j].a -= a;
          if (db[i].a < 0.01) i++;
          if (cr[j].a < 0.01) j++;
        }
        return tx;
      }

      initAdmin(() => renderFin());

      await initFirebase(() => {
        updDl();
        renderFin();
        renderChips();
      });

      if ("serviceWorker" in navigator)
        navigator.serviceWorker.register("/mgroove/sw.js");
    </script>
  </body>
</html>
