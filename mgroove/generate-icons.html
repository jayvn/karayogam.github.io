<!doctype html>
<html>
  <head>
    <title>Generate M-Groove Icons</title>
  </head>
  <body
    style="
      background: #222;
      color: #fff;
      font-family: sans-serif;
      padding: 2rem;
    "
  >
    <h2>M-Groove Icon Generator</h2>
    <p>Right-click each canvas → Save As PNG</p>
    <canvas id="c192" width="192" height="192"></canvas>
    <canvas id="c512" width="512" height="512"></canvas>
    <script>
      function draw(id, size) {
        const c = document.getElementById(id),
          ctx = c.getContext("2d");
        // Background
        ctx.fillStyle = "#0c0818";
        ctx.beginPath();
        ctx.roundRect(0, 0, size, size, size * 0.15);
        ctx.fill();
        // Gold accent circle
        ctx.fillStyle = "#f0c040";
        ctx.beginPath();
        ctx.arc(size / 2, size * 0.48, size * 0.32, 0, Math.PI * 2);
        ctx.fill();
        // Emoji
        ctx.font = `${size * 0.45}px serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("💃", size / 2, size * 0.48);
        // Text
        ctx.fillStyle = "#ece4f5";
        ctx.font = `bold ${size * 0.11}px 'sans-serif'`;
        ctx.fillText("M-GROOVE", size / 2, size * 0.88);
      }
      draw("c192", 192);
      draw("c512", 512);
    </script>
  </body>
</html>
