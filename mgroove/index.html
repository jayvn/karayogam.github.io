<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M-Groove Organizer</title>
    <meta
      name="description"
      content="Dance group organizer — songs, costumes, slots"
    />
    <meta name="theme-color" content="#f0c040" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="M-Groove" />
    <link rel="icon" type="image/png" href="/mgroove/icon.png" />
    <link rel="apple-touch-icon" href="/mgroove/icon.png" />
    <link rel="manifest" href="/mgroove/manifest.json" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/mgroove/shared.css" />
    <script>
      window.__firebase_config = JSON.stringify({
        apiKey: "AIzaSyDGrq3qdR3pqHc0dQMXnE20c2wcLOINN-8",
        authDomain: "rendercode-d73da.firebaseapp.com",
        projectId: "rendercode-d73da",
        storageBucket: "rendercode-d73da.firebasestorage.app",

      });
    </script>
    <style>
      :root {
        --male: #5b8def;
        --female: #e8365d;
        --unisex: #a78bfa;
        --glow-teal: 0 0 20px rgba(45, 212, 168, 0.15);
      }

      .prof-btn {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.35rem 0.65rem;
        cursor: pointer;
        color: var(--text);
        font-family: "Outfit", sans-serif;
        font-size: 0.83rem;
        transition: border-color 0.2s;
      }
      .prof-btn:hover {
        border-color: var(--gold-dim);
      }
      .prof-btn .al {
        max-width: 90px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      nav {
        display: flex;
        gap: 3px;
        margin-bottom: 1.15rem;
        background: var(--surface);
        border-radius: 10px;
        padding: 3px;
        overflow-x: auto;
      }
      nav button {
        flex: 1;
        min-width: 0;
        background: transparent;
        color: var(--text-dim);
        border: none;
        padding: 0.5rem 0.2rem;
        border-radius: 8px;
        cursor: pointer;
        font-family: "Outfit", sans-serif;
        font-size: 0.78rem;
        font-weight: 500;
        transition: all 0.2s;
        white-space: nowrap;
        position: relative;
      }
      nav button:hover {
        color: var(--text);
        background: var(--surface2);
      }
      nav button.active {
        background: var(--gold);
        color: var(--bg);
        font-weight: 600;
      }

      .bdot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--pink);
        position: absolute;
        top: 5px;
        right: 5px;
      }

      input[type="datetime-local"] {
        color-scheme: dark;
        min-width: 175px;
      }

      .btn-vote {
        border-color: var(--gold-dim);
        color: var(--gold);
      }
      .btn-vote.voted {
        background: var(--gold);
        color: var(--bg);
      }
      .btn-attend {
        border-color: var(--teal-dim);
        color: var(--teal);
      }
      .btn-attend.going {
        background: var(--teal);
        color: var(--bg);
      }
      .btn-final {
        border-color: var(--pink-dim);
        color: var(--pink);
      }
      .btn-final.finalized {
        background: var(--teal);
        color: var(--bg);
        border-color: var(--teal);
      }

      .card {
        background: var(--surface);
        border-left: 3px solid var(--pink);
        padding: 0.8rem 0.95rem;
        margin-bottom: 0.45rem;
        border-radius: 8px;
        animation: cardIn 0.22s ease-out;
        transition: box-shadow 0.2s;
      }
      .card:hover {
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
      }
      .card.final {
        border-left-color: var(--teal);
        background: linear-gradient(
          135deg,
          var(--surface),
          rgba(45, 212, 168, 0.04)
        );
        box-shadow: var(--glow-teal);
      }
      .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 0.4rem;
      }
      .card-body {
        flex: 1;
        min-width: 0;
      }
      .card-body a {
        color: var(--teal);
        text-decoration: none;
        word-break: break-all;
      }
      .card-body a:hover {
        text-decoration: underline;
      }
      .card-meta {
        font-size: 0.76rem;
        color: var(--text-dim);
        margin-top: 1px;
        display: inline;
      }
      .card-actions {
        display: flex;
        gap: 0.3rem;
        flex-wrap: wrap;
        margin-top: 0.4rem;
      }
      .card-btns {
        display: flex;
        gap: 2px;
        flex-shrink: 0;
      }
      .att-list {
        font-size: 0.76rem;
        color: var(--teal);
        margin-top: 0.3rem;
      }

      .costume-thumb {
        max-width: 100%;
        max-height: 180px;
        border-radius: 6px;
        margin-top: 0.45rem;
        display: block;
        object-fit: cover;
        border: 1px solid var(--border);
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .costume-thumb:hover {
        border-color: var(--gold-dim);
      }

      .g-badge {
        display: inline-block;
        padding: 0.08rem 0.4rem;
        border-radius: 4px;
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-left: 0.25rem;
      }
      .g-badge.male {
        background: rgba(91, 141, 239, 0.12);
        color: var(--male);
      }
      .g-badge.female {
        background: rgba(232, 54, 93, 0.12);
        color: var(--female);
      }
      .g-badge.unisex {
        background: rgba(167, 139, 250, 0.12);
        color: var(--unisex);
      }

      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(-5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 0.9rem;
      }
      .tab {
        background: var(--surface2);
        border: 1px solid transparent;
        color: var(--text-dim);
        padding: 0.35rem 0.75rem;
        border-radius: 6px;
        cursor: pointer;
        font-family: "Outfit", sans-serif;
        font-size: 0.8rem;
        font-weight: 500;
        transition: all 0.15s;
      }
      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        border-color: var(--gold);
        color: var(--gold);
        background: rgba(240, 192, 64, 0.06);
      }

      .dz {
        border: 2px dashed var(--border);
        border-radius: 10px;
        padding: 1.1rem;
        text-align: center;
        color: var(--text-dim);
        font-size: 0.83rem;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 0.9rem;
        position: relative;
      }
      .dz:hover,
      .dz.over {
        border-color: var(--gold);
        color: var(--gold);
        background: rgba(240, 192, 64, 0.02);
      }
      .dz input[type="file"] {
        display: none;
      }
      .dz .prev {
        max-width: 100%;
        max-height: 130px;
        border-radius: 6px;
        margin-top: 0.4rem;
        display: block;
        margin-inline: auto;
      }
      .dz .clr {
        position: absolute;
        top: 6px;
        right: 6px;
        background: var(--danger);
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 22px;
        height: 22px;
        font-size: 13px;
        line-height: 22px;
        text-align: center;
        cursor: pointer;
        display: none;
      }

      .dash-s {
        margin-bottom: 1.4rem;
      }
      .dash-s h3 {
        font-family: "Space Mono", monospace;
        font-size: 0.86rem;
        color: var(--gold);
        margin-bottom: 0.5rem;
      }
      .dash-hint {
        font-size: 0.76rem;
        color: var(--text-dim);
        margin-bottom: 0.45rem;
        font-style: italic;
      }
      .dash-i {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.55rem 0.75rem;
        background: var(--surface);
        border-radius: 8px;
        margin-bottom: 0.3rem;
        cursor: pointer;
        transition: background 0.15s;
        border-left: 3px solid var(--pink);
      }
      .dash-i:hover {
        background: var(--surface2);
      }
      .dash-i .ic {
        font-size: 1rem;
        flex-shrink: 0;
      }
      .dash-i .tx {
        flex: 1;
        min-width: 0;
        font-size: 0.88rem;
      }
      .dash-i .tx small {
        color: var(--text-dim);
        font-size: 0.76rem;
      }
      .dash-em {
        color: var(--text-dim);
        font-size: 0.86rem;
        padding: 0.4rem 0;
      }

      .lb {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.88);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        cursor: pointer;
        animation: fi 0.15s;
      }
      .lb img {
        max-width: 94vw;
        max-height: 92vh;
        border-radius: 8px;
      }

      .user-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 0.7rem;
        background: var(--surface);
        border-radius: 6px;
        margin-bottom: 0.3rem;
        font-size: 0.85rem;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .user-row .ur-meta {
        font-size: 0.76rem;
        color: var(--text-dim);
      }
    </style>
  </head>

  <body>
    <div class="shell">
      <header>
        <span class="logo">💃 M-Groove</span>
        <div class="hdr-r">
          <a class="nav-link" href="/mgroove/finance.html">💸 Finance</a>
          <button class="prof-btn" id="profBtn">
            👤 <span class="al" id="hAlias">Anon</span>
          </button>
          <button class="prof-btn ao" id="exportBtn" title="Export data">
            💾
          </button>
          <label class="adm-l"
            ><input type="checkbox" id="admTog" /> 👑 Admin</label
          >
        </div>
      </header>
      <nav id="nav">
        <button data-v="home" class="active">🏠 Home</button>
        <button data-v="songs">🎵 Songs</button>
        <button data-v="costumes">👗 Costumes</button>
        <button data-v="slots">📅 Slots</button>
        <button data-v="past">🕰️ Past</button>
      </nav>
      <main id="vHome">
        <div class="dash-s" id="dashVotes"></div>
        <div class="dash-s" id="dashRsvp"></div>
        <div class="dash-s" id="dashRecent"></div>
        <div class="dash-s ao" id="dashUsers"></div>
      </main>
      <main id="vSongs" class="hidden">
        <div class="irow">
          <input id="songIn" placeholder="🔗 YT / Spotify link or song name…" />
          <button class="btn btn-add" id="addSong">＋</button>
        </div>
        <div id="songL"></div>
        <div id="songE" class="empty">
          <div class="icon">🎵</div>
          No songs yet
        </div>
      </main>
      <main id="vCostumes" class="hidden">
        <div class="irow">
          <input
            id="cosIn"
            placeholder="🔗 Image link or idea…"
            style="flex: 2"
          />
          <select id="cosG" style="flex: 0 0 95px">
            <option value="unisex">⚥ Unisex</option>
            <option value="male">♂ Male</option>
            <option value="female">♀ Female</option>
          </select>
          <button class="btn btn-add" id="addCos">＋</button>
        </div>
        <div class="dz" id="cosDz">
          📷 Drop, paste, or <strong>click</strong> to attach image
          <input type="file" accept="image/*" id="cosFile" />
          <img class="prev hidden" id="cosPrev" />
          <button class="clr" id="cosClr">✕</button>
        </div>
        <div class="tabs" id="cosTabs">
          <button class="tab active" data-f="all">All</button>
          <button class="tab" data-f="male">♂ Male</button>
          <button class="tab" data-f="female">♀ Female</button>
          <button class="tab" data-f="unisex">⚥ Unisex</button>
        </div>
        <div id="cosL"></div>
        <div id="cosE" class="empty">
          <div class="icon">👗</div>
          No costume ideas yet
        </div>
      </main>
      <main id="vSlots" class="hidden">
        <div class="irow">
          <input type="datetime-local" id="slDt" />
          <input id="slLoc" placeholder="📍 Location…" />
        </div>
        <div class="irow">
          <input
            type="number"
            id="slCost"
            placeholder="€ Cost"
            min="0"
            step="0.01"
            style="flex: 0 0 95px"
          />
          <input id="slPayer" placeholder="Paid by…" list="userDl" />
          <button class="btn btn-add" id="addSl">＋ Slot</button>
        </div>
        <div id="slL"></div>
        <div id="slE" class="empty">
          <div class="icon">📅</div>
          No slots yet
        </div>
      </main>
      <main id="vPast" class="hidden">
        <div id="pastL"></div>
        <div id="pastE" class="empty">
          <div class="icon">🕰️</div>
          Nothing archived
        </div>
      </main>
      <datalist id="userDl"></datalist>
    </div>

    <script type="module">
      import {
        $,
        mk,
        esc,
        S,
        save,
        saveLocal,
        me,
        modal,
        cDlg,
        initAdmin,
        initFirebase,
        syncU,
        updDl,
      } from "/mgroove/shared.js";

      const IC = { song: "🎶", costume: "👗", slot: "📅" };
      const TAB = { song: "songs", costume: "costumes", slot: "slots" };
      const canMod = (w) => S.isAdmin || me() === w;
      const myVotes = () => (S.users[me()] && S.users[me()].votes) || [];
      const iVoted = (id) => myVotes().includes(id);
      function addMyVote(id) {
        if (me() === "Anon" || !S.users[me()]) return;
        if (!S.users[me()].votes) S.users[me()].votes = [];
        if (!iVoted(id)) S.users[me()].votes.push(id);
      }
      function rmMyVote(id) {
        if (!S.users[me()] || !S.users[me()].votes) return;
        S.users[me()].votes = S.users[me()].votes.filter((x) => x !== id);
      }

      function fmtDate(dt, opts) {
        return dt ? new Date(dt).toLocaleDateString("en-GB", opts) : "";
      }
      const SHORT_DATE = { weekday: "short", day: "numeric", month: "short" };
      const LONG_DATE = { ...SHORT_DATE, hour: "2-digit", minute: "2-digit" };

      function itemLabel(item) {
        if (item._t === "slot") {
          const ds = fmtDate(item.datetime, SHORT_DATE) || "Slot";
          return ds + (item.location ? " · " + item.location : "");
        }
        return item.text || "";
      }

      function xLink(t) {
        const m = t.match(/(https?:\/\/[^\s]+)/);
        return m ? m[1] : null;
      }
      function isImg(u) {
        return /\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?.*)?$/i.test(u);
      }
      function lbox(src) {
        const l = mk("div", "lb");
        l.innerHTML = '<img src="' + src + '">';
        l.onclick = () => l.remove();
        document.body.appendChild(l);
      }

      // Nav
      const views = {};
      document.querySelectorAll('main[id^="v"]').forEach((el) => {
        views[el.id.slice(1).toLowerCase()] = el;
      });
      function go(k) {
        Object.values(views).forEach((v) => v.classList.add("hidden"));
        views[k].classList.remove("hidden");
        document
          .querySelectorAll("#nav button")
          .forEach((b) => b.classList.toggle("active", b.dataset.v === k));
        if (k === "home") renderDash();
      }
      document
        .querySelectorAll("#nav button")
        .forEach((b) => (b.onclick = () => go(b.dataset.v)));

      function togE(t) {
        const em = {
          songs: "songE",
          costumes: "cosE",
          slots: "slE",
          past: "pastE",
        };
        const lm = {
          songs: "songL",
          costumes: "cosL",
          slots: "slL",
          past: "pastL",
        };
        const e = $(em[t]),
          l = $(lm[t]);
        if (!e || !l) return;
        e.classList.toggle(
          "hidden",
          t === "costumes"
            ? l.querySelectorAll(".card:not(.fh)").length > 0
            : l.children.length > 0,
        );
      }

      // Rename
      function renameUser(oldName, newName) {
        if (S.users[oldName]) {
          S.users[newName] = { ...S.users[oldName] };
          delete S.users[oldName];
        }
        [S.songs, S.costumes, S.slots, S.past].forEach((arr) =>
          arr.forEach((item) => {
            if (item.addedBy === oldName) item.addedBy = newName;
          }),
        );
        [...S.slots, ...S.past].forEach((s) => {
          if (!s.attendees) return;
          const i = s.attendees.indexOf(oldName);
          if (i !== -1) s.attendees[i] = newName;
        });
        S.expenses.forEach((e) => {
          if (e.payer === oldName) e.payer = newName;
          if (!e.attendees) return;
          const i = e.attendees.indexOf(oldName);
          if (i !== -1) e.attendees[i] = newName;
        });
      }

      // Profile
      function openProf() {
        const m = modal(
          "<h3>👤 Your Profile</h3>" +
            '<div class="f"><label>Alias</label><input id="pA" value="' +
            esc(S.profile.alias) +
            '" placeholder="Your good name please. Bad anelum "></div>' +
            '<div class="f"><label>📍 Location</label><input id="pL" value="' +
            esc(S.profile.location) +
            '" placeholder="address for meetups (optional)…"></div>' +
            '<div class="f"><label>💳 PayPal</label><input id="pP" value="' +
            esc(S.profile.paypal) +
            '" placeholder="for reimbursements (optional)"></div>' +
            '<div class="acts"><button class="btn" id="pC">Cancel</button><button class="btn btn-add" id="pS">Save</button></div>',
        );
        m.q("#pA").focus();
        m.q("#pC").onclick = m.close;
        m.q("#pS").onclick = () => {
          const newAlias = m.q("#pA").value.trim(),
            oldAlias = S.profile.alias;
          if (newAlias && newAlias !== oldAlias && S.users[newAlias]) {
            const existing = m.el.querySelector(".collision-warn");
            if (existing) existing.remove();
            const warn = mk("div", "collision-warn");
            warn.innerHTML =
              '<div style="color:var(--danger);font-size:0.82rem;padding:0.5rem;background:rgba(239,68,68,.1);border-radius:6px">⚠️ "<strong>' +
              esc(newAlias) +
              '</strong>" is already taken.</div>';
            m.q(".md").insertBefore(warn, m.q(".acts"));
            return;
          }
          S.profile.alias = newAlias;
          S.profile.location = m.q("#pL").value.trim();
          S.profile.paypal = m.q("#pP").value.trim();
          if (oldAlias && oldAlias !== newAlias) renameUser(oldAlias, newAlias);
          syncU();
          save();
          $("hAlias").textContent = me();
          updDl();
          m.close();
          fullRender();
        };
      }

      $("hAlias").textContent = me();
      $("profBtn").onclick = openProf;
      $("exportBtn").onclick = () => {
        const a = mk("a");
        a.href = URL.createObjectURL(
          new Blob([JSON.stringify(S, null, 2)], { type: "application/json" }),
        );
        a.download =
          "mgroove-backup-" + new Date().toISOString().slice(0, 10) + ".json";
        a.click();
        URL.revokeObjectURL(a.href);
      };
      if (!S.profile.alias) setTimeout(openProf, 300);

      // Edit modal
      function openEd(item, type, cb) {
        let f = "";
        if (type === "song")
          f =
            '<div class="f"><label>Song</label><input id="eT" value="' +
            esc(item.text) +
            '"></div>';
        else if (type === "costume")
          f =
            '<div class="f"><label>Idea/Link</label><input id="eT" value="' +
            esc(item.text) +
            '"></div>' +
            '<div class="f"><label>Gender</label><select id="eG" style="width:100%">' +
            ["unisex", "male", "female"]
              .map(
                (g) =>
                  '<option value="' +
                  g +
                  '"' +
                  (item.gender === g ? " selected" : "") +
                  ">" +
                  g +
                  "</option>",
              )
              .join("") +
            "</select></div>";
        else {
          const dt = item.datetime
            ? new Date(item.datetime).toISOString().slice(0, 16)
            : "";
          f =
            '<div class="f"><label>Date & Time</label><input type="datetime-local" id="eDt" value="' +
            dt +
            '" style="width:100%;color-scheme:dark"></div>' +
            '<div class="f"><label>Location</label><input id="eLo" value="' +
            esc(item.location || "") +
            '"></div>' +
            '<div class="f"><label>Cost €</label><input type="number" id="eCo" value="' +
            (item.cost || 0) +
            '" min="0" step="0.01"></div>' +
            '<div class="f"><label>Paid by</label><input id="ePa" value="' +
            esc(item.payer || "") +
            '" list="userDl"></div>';
        }
        const m = modal(
          "<h3>✏️ Edit</h3>" +
            f +
            '<div class="acts"><button class="btn" id="eC">Cancel</button><button class="btn btn-add" id="eS">Save</button></div>',
        );
        m.q("#eC").onclick = m.close;
        m.q("#eS").onclick = () => {
          if (type === "song") item.text = m.q("#eT").value.trim() || item.text;
          else if (type === "costume") {
            item.text = m.q("#eT").value.trim() || item.text;
            item.gender = m.q("#eG").value;
          } else {
            item.datetime = m.q("#eDt").value || item.datetime;
            item.location = m.q("#eLo").value.trim();
            item.cost = parseFloat(m.q("#eCo").value) || 0;
            item.payer = m.q("#ePa").value.trim();
          }
          save();
          m.close();
          cb();
        };
      }

      // Card rendering
      function rCard(item, type, listEl) {
        const card = mk("div", "card" + (item.finalized ? " final" : ""));
        card.dataset.id = item.id;
        if (type === "costume") card.dataset.gender = item.gender || "unisex";

        function build() {
          card.innerHTML = "";
          if (type === "costume") card.dataset.gender = item.gender || "unisex";
          card.className = "card" + (item.finalized ? " final" : "");
          const ic = IC[type],
            link = xLink(item.text || "");

          let tH = "";
          if (type === "slot") {
            const ds = fmtDate(item.datetime, LONG_DATE) || "No date";
            tH = ic + " <strong>" + ds + "</strong>";
            if (item.location) tH += " · 📍 " + esc(item.location);
          } else if (link) {
            const c = (item.text || "").replace(link, "").trim();
            tH =
              ic +
              " " +
              (c ? esc(c) + " " : "") +
              '<a href="' +
              link +
              '" target="_blank">' +
              (link.length > 45 ? link.slice(0, 45) + "…" : link) +
              "</a>";
          } else tH = ic + " " + esc(item.text || "");

          let meta =
            '<span class="card-meta">by ' +
            esc(item.addedBy || "?") +
            "</span>";
          if (type === "slot" && item.cost > 0)
            meta +=
              ' <span class="card-meta">· 💰 €' +
              (+item.cost).toFixed(2) +
              (item.payer ? " (" + esc(item.payer) + ")" : "") +
              "</span>";
          if (type === "costume" && item.gender)
            meta +=
              ' <span class="g-badge ' +
              item.gender +
              '">' +
              item.gender +
              "</span>";

          const top = mk("div", "card-top"),
            bd = mk("div", "card-body");
          bd.innerHTML = tH + "<div>" + meta + "</div>";

          const imgSrc =
            item.imageData ||
            (type === "costume" && link && isImg(link) ? link : null);
          if (type === "costume" && imgSrc) {
            const im = mk("img", "costume-thumb");
            im.src = imgSrc;
            im.onclick = () => lbox(imgSrc);
            bd.appendChild(im);
          }

          const btns = mk("div", "card-btns");
          if (canMod(item.addedBy) && !item.finalized) {
            const eb = mk("button", "btn btn-icon");
            eb.textContent = "✏️";
            eb.onclick = () => openEd(item, type, build);
            btns.appendChild(eb);
          }
          if (canMod(item.addedBy)) {
            const db = mk("button", "btn btn-icon del");
            db.textContent = "✕";
            db.onclick = async () => {
              if (!(await cDlg("Delete this item?"))) return;
              const a = S[type + "s"],
                i = a.findIndex((x) => x.id === item.id);
              if (i !== -1) a.splice(i, 1);
              const ei = S.expenses.findIndex((e) => e.sourceId === item.id);
              if (ei !== -1) S.expenses.splice(ei, 1);
              card.remove();
              togE(type + "s");
              save();
            };
            btns.appendChild(db);
          }
          top.appendChild(bd);
          top.appendChild(btns);
          card.appendChild(top);

          const acts = mk("div", "card-actions");
          if (!item.finalized) {
            const vb = mk(
              "button",
              "btn btn-sm btn-vote" + (iVoted(item.id) ? " voted" : ""),
            );
            vb.textContent = "👍 " + (item.votes || 0);
            vb.onclick = () => {
              if (iVoted(item.id)) {
                item.votes = Math.max(0, (item.votes || 0) - 1);
                rmMyVote(item.id);
              } else {
                item.votes = (item.votes || 0) + 1;
                addMyVote(item.id);
              }
              vb.textContent = "👍 " + item.votes;
              vb.classList.toggle("voted", iVoted(item.id));
              save();
            };
            acts.appendChild(vb);
          }

          let attDiv;
          if (type === "slot") {
            const att = new Set(item.attendees || []);
            const ab = mk(
              "button",
              "btn btn-sm btn-attend" + (att.has(me()) ? " going" : ""),
            );
            ab.textContent = "🙋 Going (" + att.size + ")";
            ab.disabled = !!item.finalized;
            ab.onclick = () => {
              const n = me();
              att.has(n) ? att.delete(n) : att.add(n);
              item.attendees = [...att];
              ab.textContent = "🙋 Going (" + att.size + ")";
              ab.classList.toggle("going", att.has(n));
              attDiv.textContent = att.size ? "→ " + [...att].join(", ") : "";
              save();
            };
            acts.appendChild(ab);
            attDiv = mk("div", "att-list");
            attDiv.textContent = att.size ? "→ " + [...att].join(", ") : "";
          }

          const fb = mk(
            "button",
            "btn btn-sm btn-final ao" + (item.finalized ? " finalized" : ""),
          );
          fb.textContent = item.finalized ? "⏪ Undo" : "🎯 Finalize";
          fb.onclick = () => {
            if (item.finalized) {
              item.finalized = false;
              const ei = S.expenses.findIndex((e) => e.sourceId === item.id);
              if (ei !== -1) S.expenses.splice(ei, 1);
            } else {
              item.finalized = true;
              if (
                type === "slot" &&
                item.cost > 0 &&
                !S.expenses.find((e) => e.sourceId === item.id)
              )
                S.expenses.push({
                  sourceId: item.id,
                  title:
                    (item.location || "Session") +
                    (item.datetime
                      ? " " + new Date(item.datetime).toLocaleDateString()
                      : ""),
                  cost: +item.cost,
                  payer: item.payer || "Group Fund",
                  attendees: [...(item.attendees || [])],
                });
              if (type !== "slot") {
                const a = S[type + "s"],
                  i = a.findIndex((x) => x.id === item.id);
                if (i !== -1) a.splice(i, 1);
                S.past.push({ ...item, type, archivedAt: Date.now() });
                save();
                card.remove();
                togE(type + "s");
                return;
              }
            }
            save();
            build();
          };
          acts.appendChild(fb);

          if (type === "slot" && item.finalized) {
            const arb = mk("button", "btn btn-sm ao");
            arb.textContent = "🕰️ Archive";
            arb.onclick = async () => {
              if (!(await cDlg("Archive?"))) return;
              const i = S.slots.findIndex((x) => x.id === item.id);
              if (i !== -1) S.slots.splice(i, 1);
              S.past.push({ ...item, type: "slot", archivedAt: Date.now() });
              save();
              card.remove();
              togE("slots");
            };
            acts.appendChild(arb);
          }
          card.appendChild(acts);
          if (attDiv) card.appendChild(attDiv);
        }
        build();
        listEl.appendChild(card);
      }

      // Add item
      function addI(type, data) {
        const item = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          addedBy: me(),
          votes: 0,
          finalized: false,
          ...data,
        };
        S[type + "s"].push(item);
        save();
        rCard(
          item,
          type,
          $({ song: "songL", costume: "cosL", slot: "slL" }[type]),
        );
        togE(type + "s");
      }

      // Songs
      const doSong = () => {
        const v = $("songIn").value.trim();
        if (!v) return;
        addI("song", { text: v });
        $("songIn").value = "";
      };
      $("addSong").onclick = doSong;
      $("songIn").onkeydown = (e) => {
        if (e.key === "Enter") doSong();
      };

      // Costumes
      let pendImg = null;
      const doCos = () => {
        const v = $("cosIn").value.trim();
        if (!v && !pendImg) return;
        addI("costume", {
          text: v || "Image costume",
          gender: $("cosG").value,
          imageData: pendImg || null,
        });
        $("cosIn").value = "";
        clrI();
        applyCF();
      };
      $("addCos").onclick = doCos;
      $("cosIn").onkeydown = (e) => {
        if (e.key === "Enter") doCos();
      };

      function setI(d) {
        pendImg = d;
        $("cosPrev").src = d;
        $("cosPrev").classList.remove("hidden");
        $("cosClr").style.display = "block";
      }
      function clrI() {
        pendImg = null;
        $("cosPrev").classList.add("hidden");
        $("cosPrev").src = "";
        $("cosClr").style.display = "none";
      }
      $("cosClr").onclick = (e) => {
        e.stopPropagation();
        clrI();
      };

      function rdImg(f) {
        if (!f || !f.type.startsWith("image/")) return;
        const r = new FileReader();
        r.onload = (e) => setI(e.target.result);
        r.readAsDataURL(f);
      }
      const dz = $("cosDz");
      dz.onclick = (e) => {
        if (e.target.tagName !== "BUTTON") $("cosFile").click();
      };
      $("cosFile").onchange = (e) => {
        if (e.target.files[0]) rdImg(e.target.files[0]);
      };
      dz.ondragover = (e) => {
        e.preventDefault();
        dz.classList.add("over");
      };
      dz.ondragleave = () => dz.classList.remove("over");
      dz.ondrop = (e) => {
        e.preventDefault();
        dz.classList.remove("over");
        if (e.dataTransfer.files[0]) rdImg(e.dataTransfer.files[0]);
      };
      document.addEventListener("paste", (e) => {
        if ($("vCostumes").classList.contains("hidden")) return;
        for (const it of e.clipboardData.items)
          if (it.type.startsWith("image/")) {
            rdImg(it.getAsFile());
            break;
          }
      });

      let cosF = "all";
      function applyCF() {
        document.querySelectorAll("#cosL .card").forEach((c) => {
          const h = cosF !== "all" && c.dataset.gender !== cosF;
          c.classList.toggle("fh", h);
          c.style.display = h ? "none" : "";
        });
        togE("costumes");
      }
      document.querySelectorAll("#cosTabs .tab").forEach((b) => {
        b.onclick = () => {
          document
            .querySelectorAll("#cosTabs .tab")
            .forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          cosF = b.dataset.f;
          applyCF();
        };
      });

      // Slots
      const doSlot = () => {
        const dt = $("slDt").value,
          loc = $("slLoc").value.trim();
        if (!dt && !loc) return;
        addI("slot", {
          datetime: dt,
          location: loc,
          cost: parseFloat($("slCost").value) || 0,
          payer: $("slPayer").value.trim(),
          attendees: [],
        });
        $("slDt").value = "";
        $("slLoc").value = "";
        $("slCost").value = "";
        $("slPayer").value = "";
      };
      $("addSl").onclick = doSlot;
      [$("slLoc"), $("slPayer")].forEach(
        (el) =>
          (el.onkeydown = (e) => {
            if (e.key === "Enter") doSlot();
          }),
      );
      const now = new Date();
      now.setMinutes(0, 0, 0);
      now.setHours(now.getHours() + 1);
      $("slDt").value = new Date(
        now.getTime() - now.getTimezoneOffset() * 60000,
      )
        .toISOString()
        .slice(0, 16);

      // Past
      function rPast(item) {
        const ic = IC[item.type] || "📌",
          card = mk("div", "card final");
        let txt =
          item.type === "slot"
            ? ic +
              " " +
              fmtDate(item.datetime, SHORT_DATE) +
              (item.location ? " · " + esc(item.location) : "")
            : ic + " " + esc(item.text || "");
        card.innerHTML =
          '<div class="card-top"><div class="card-body">' +
          txt +
          '<div class="card-meta">Archived ' +
          new Date(item.archivedAt).toLocaleDateString() +
          "</div></div></div>";
        $("pastL").appendChild(card);
      }

      // Dashboard
      function renderDash() {
        const dv = $("dashVotes"),
          dr = $("dashRsvp"),
          dc = $("dashRecent");
        dv.innerHTML = "";
        dr.innerHTML = "";
        dc.innerHTML = "";

        const all = [
          ...S.songs.map((s) => ({ ...s, _t: "song" })),
          ...S.costumes.map((c) => ({ ...c, _t: "costume" })),
          ...S.slots.map((s) => ({ ...s, _t: "slot" })),
        ];

        // Pending votes
        const unv = all.filter((i) => !i.finalized && !iVoted(i.id));
        dv.innerHTML =
          "<h3>🗳️ Pending Votes (" +
          unv.length +
          ')</h3><div class="dash-hint">All votes are anonymous — only totals are visible</div>';
        if (!unv.length)
          dv.innerHTML +=
            '<div class="dash-em">✅ You\'ve voted on everything!</div>';
        else {
          unv.slice(0, 6).forEach((item) => {
            const ic = IC[item._t],
              lb = itemLabel(item).slice(0, 50);
            const d = mk("div", "dash-i");
            const txDiv = mk("div", "tx");
            txDiv.innerHTML =
              esc(lb) +
              "<br><small>" +
              ic +
              " · " +
              (item.votes || 0) +
              " votes</small>";
            const vb = mk("button", "btn btn-sm btn-vote");
            vb.textContent = "👍";
            vb.onclick = (e) => {
              e.stopPropagation();
              item.votes = (item.votes || 0) + 1;
              addMyVote(item.id);
              save();
              renderDash();
            };
            d.appendChild(mk("span", "ic")).textContent = ic;
            d.appendChild(txDiv);
            d.appendChild(vb);
            d.onclick = () => go(TAB[item._t]);
            dv.appendChild(d);
          });
          if (unv.length > 6)
            dv.innerHTML +=
              '<div class="dash-em">…and ' + (unv.length - 6) + " more</div>";
        }

        // RSVP
        const unr = S.slots.filter(
          (s) => !s.finalized && !(s.attendees || []).includes(me()),
        );
        dr.innerHTML = "<h3>📅 RSVP Needed (" + unr.length + ")</h3>";
        if (!unr.length)
          dr.innerHTML += '<div class="dash-em">✅ All caught up!</div>';
        else
          unr.forEach((s) => {
            const dt = fmtDate(s.datetime, LONG_DATE) || "TBD";
            const d = mk("div", "dash-i");
            const txDiv = mk("div", "tx");
            txDiv.innerHTML =
              dt +
              (s.location ? " · " + esc(s.location) : "") +
              "<br><small>" +
              (s.attendees || []).length +
              " going</small>";
            const ab = mk("button", "btn btn-sm btn-attend");
            ab.textContent = "🙋";
            ab.onclick = (e) => {
              e.stopPropagation();
              if (!s.attendees) s.attendees = [];
              if (!s.attendees.includes(me())) s.attendees.push(me());
              save();
              renderDash();
            };
            d.appendChild(mk("span", "ic")).textContent = "📅";
            d.appendChild(txDiv);
            d.appendChild(ab);
            d.onclick = () => go("slots");
            dr.appendChild(d);
          });

        // Recent
        const recent = all
          .sort((a, b) => parseInt(b.id, 36) - parseInt(a.id, 36))
          .slice(0, 5);
        dc.innerHTML = "<h3>🆕 Recent</h3>";
        if (!recent.length)
          dc.innerHTML += '<div class="dash-em">Nothing yet!</div>';
        else
          recent.forEach((item) => {
            const ic = IC[item._t],
              lb = itemLabel(item).slice(0, 50);
            const d = mk("div", "dash-i");
            d.style.borderLeftColor = "var(--surface3)";
            const txDiv = mk("div", "tx");
            txDiv.innerHTML =
              esc(lb) +
              "<br><small>by " +
              esc(item.addedBy || "?") +
              " · " +
              (item.votes || 0) +
              " votes</small>";
            d.appendChild(mk("span", "ic")).textContent = ic;
            d.appendChild(txDiv);
            d.onclick = () => go(TAB[item._t]);
            dc.appendChild(d);
          });

        // Nav dots
        document
          .querySelectorAll("#nav button .bdot")
          .forEach((d) => d.remove());
        if (S.songs.some((s) => !s.finalized && !iVoted(s.id)))
          document
            .querySelector('[data-v="songs"]')
            .appendChild(mk("span", "bdot"));
        if (S.costumes.some((c) => !c.finalized && !iVoted(c.id)))
          document
            .querySelector('[data-v="costumes"]')
            .appendChild(mk("span", "bdot"));
        if (
          S.slots.some(
            (s) =>
              !s.finalized &&
              (!iVoted(s.id) || !(s.attendees || []).includes(me())),
          )
        )
          document
            .querySelector('[data-v="slots"]')
            .appendChild(mk("span", "bdot"));

        // Admin: user list
        const du = $("dashUsers");
        du.innerHTML = "";
        if (S.isAdmin) {
          const uKeys = Object.keys(S.users);
          du.innerHTML = "<h3>👥 Registered Users (" + uKeys.length + ")</h3>";
          if (!uKeys.length)
            du.innerHTML += '<div class="dash-em">No users yet</div>';
          else
            uKeys.sort().forEach((name) => {
              const u = S.users[name],
                r = mk("div", "user-row");
              r.innerHTML =
                "<div><strong>" +
                esc(name) +
                '</strong> <span class="ur-meta">' +
                (u.location || "no location") +
                '</span></div><div class="ur-meta">' +
                (u.paypal || "no PayPal") +
                "</div>";
              du.appendChild(r);
            });
        }
      }

      function fullRender() {
        ["songL", "cosL", "slL", "pastL"].forEach(
          (id) => ($(id).innerHTML = ""),
        );
        S.songs.forEach((s) => rCard(s, "song", $("songL")));
        S.costumes.forEach((c) => rCard(c, "costume", $("cosL")));
        S.slots.forEach((s) => rCard(s, "slot", $("slL")));
        S.past.forEach((p) => rPast(p));
        ["songs", "costumes", "slots", "past"].forEach(togE);
        applyCF();
        renderDash();
        updDl();
      }

      syncU();
      updDl();
      initAdmin(() => {
        saveLocal();
        renderDash();
      });
      saveLocal();
      fullRender();

      await initFirebase(() => {
        syncU();
        fullRender();
        $("hAlias").textContent = me();
      });

      if ("serviceWorker" in navigator)
        navigator.serviceWorker.register("/mgroove/sw.js");
    </script>
  </body>
</html>
