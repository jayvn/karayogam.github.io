<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M-Groove Organizer</title>
    <meta
      name="description"
      content="Dance group organizer — songs, costumes, slots"
    />
    <meta name="theme-color" content="#f0c040" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="M-Groove" />
    <link rel="icon" type="image/png" href="/mgroove/icon.png" />
    <link rel="apple-touch-icon" href="/mgroove/icon.png" />
    <link rel="manifest" href="/mgroove/manifest.json" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/mgroove/shared.css" />
    <link rel="stylesheet" href="/mgroove/index.css" />
    <script>
      window.__firebase_config = JSON.stringify({
        apiKey: "AIzaSyDGrq3qdR3pqHc0dQMXnE20c2wcLOINN-8",
        authDomain: "rendercode-d73da.firebaseapp.com",
        projectId: "rendercode-d73da",
        storageBucket: "rendercode-d73da.firebasestorage.app",
        messagingSenderId: "798989930424",
        appId: "1:798989930424:web:7f324e5153cabc5d90494d",
      });
    </script>
  </head>

  <body>
    <div class="shell">
      <header>
        <span class="logo"><img src="/mgroove/icon.png" alt="M-Groove"> M-Groove</span>
        <div class="hdr-r">
          <a class="nav-link" href="/choreo/">🎵 ChoreoMarker</a>
          <a class="nav-link" href="/mgroove/finance.html">💸 Finance</a>
          <button class="prof-btn" id="profBtn">
            👤 <span class="al" id="hAlias">Anon</span>
          </button>
          <button class="prof-btn ao" id="exportBtn" title="Export data">
            💾
          </button>
        </div>
      </header>
      <nav id="nav">
        <button data-v="home" class="active">🏠 Home</button>
        <button data-v="songs">🎵 Songs</button>
        <button data-v="costumes">👗 Costumes</button>
        <button data-v="slots">📅 Slots</button>
        <button data-v="misc">🗳️ Misc</button>
      </nav>
      <main id="vHome">
        <div class="dash-s" id="dashVotes"></div>
        <div class="dash-s" id="dashRsvp"></div>
        <div class="dash-s" id="dashRecent"></div>

      </main>
      <main id="vSongs" class="hidden">
        <div class="irow">
          <input id="songIn" placeholder="🔗 YT / Spotify link…" />
          <input id="songName" placeholder="Song name (optional)" style="max-width:180px" />
          <button class="btn btn-add" id="addSong">＋</button>
        </div>
        <div id="songL"></div>
        <div id="songE" class="empty">
          <div class="icon">🎵</div>
          No songs yet
        </div>
      </main>
      <main id="vCostumes" class="hidden">
        <div class="irow">
          <input
            id="cosIn"
            placeholder="🔗 Image link or idea…"
            class="flex-2"
          />
          <select id="cosG" class="w-fix">
            <option value="unisex">⚥ Unisex</option>
            <option value="male">♂ Male</option>
            <option value="female">♀ Female</option>
          </select>
          <button class="btn btn-add" id="addCos">＋</button>
        </div>
        <div class="dz" id="cosDz">
          📷 Drop, paste, or <strong>click</strong> to attach image
          <input type="file" accept="image/*" id="cosFile" />
          <img class="prev" id="cosPrev" hidden />
          <button class="clr" id="cosClr">✕</button>
        </div>
        <div class="tabs" id="cosTabs">
          <button class="tab active" data-f="all">All</button>
          <button class="tab" data-f="male">♂ Male</button>
          <button class="tab" data-f="female">♀ Female</button>
          <button class="tab" data-f="unisex">⚥ Unisex</button>
        </div>
        <div id="cosL"></div>
        <div id="cosE" class="empty">
          <div class="icon">👗</div>
          No costume ideas yet
        </div>
      </main>
      <main id="vSlots" class="hidden">
        <div class="irow">
          <input type="datetime-local" id="slDt" />
          <input id="slLoc" placeholder="📍 Location…" />
        </div>
        <div class="irow">
          <input
            type="number"
            id="slCost"
            placeholder="€ Cost"
            min="0"
            step="0.01"
            class="w-fix"
          />
          <input id="slPayer" placeholder="Paid by…" list="userDl" />
          <button class="btn btn-add" id="addSl">＋ Slot</button>
        </div>
        <div id="slL"></div>
        <div id="slE" class="empty">
          <div class="icon">📅</div>
          No slots yet
        </div>
      </main>
      <main id="vMisc" class="hidden">
        <div class="irow">
          <input id="miscIn" placeholder="📝 Vote topic…" />
          <button class="btn btn-add" id="addMisc">＋</button>
        </div>
        <div id="miscL"></div>
        <div id="miscE" class="empty">
          <div class="icon">🗳️</div>
          No misc votes yet
        </div>
      </main>
      <datalist id="userDl"></datalist>
    </div>

    <script type="module" src="/mgroove/app.js"></script>
  </body>
</html>
